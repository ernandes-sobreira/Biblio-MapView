<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblio-MapView</title>
<style>
:root{--azul:#1f5f8b;--azul2:#2e86ab;--bg:#f7f9fb;--card:#ffffff;
  --borda:#e2e8ee;--texto:#243447;--suave:#6b7c8f;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--texto);line-height:1.5;padding:24px}
.wrap{max-width:1180px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:2px;color:var(--azul)}
.sub{font-size:14px;color:var(--suave);margin-bottom:18px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;border:1px solid var(--borda);
  border-bottom:none;background:#eef2f6;cursor:pointer;font-size:14px;font-weight:600;color:var(--suave)}
.tab.on{background:var(--card);color:var(--azul);box-shadow:0 -2px 0 var(--azul2) inset}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--borda);border-radius:12px;
  padding:18px;box-shadow:0 1px 3px rgba(30,60,90,.04)}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--texto)}
textarea{width:100%;min-height:260px;border:1px solid var(--borda);border-radius:8px;
  padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;
  resize:vertical;color:var(--texto)}
.hint{font-size:12px;color:var(--suave);margin-top:6px}
.row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
button{border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.pri{background:var(--azul2);color:#fff}
.pri:hover{background:var(--azul)}
.sec{background:#eef2f6;color:var(--texto)}
.sec:hover{background:#e2e8ee}
.controls{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;align-items:center}
.ctrl{display:flex;flex-direction:column;gap:4px}
.ctrl label{font-size:12px;margin:0}
input[type=color]{border:1px solid var(--borda);border-radius:6px;padding:2px;width:44px;height:32px;cursor:pointer}
.mapcard{padding:12px}
#mapbox svg{width:100%;height:auto;display:block}
.legend{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding:0 8px 4px}
.legbar{height:14px;flex:1;max-width:320px;border-radius:3px;border:1px solid var(--borda)}
.legval{font-size:12px;color:var(--suave)}
.credit{font-size:11px;color:var(--suave);text-align:center;padding:6px 8px 2px;letter-spacing:.2px}
.warn{background:#fff6e6;border:1px solid #f0d38a;color:#8a6410;border-radius:8px;
  padding:10px 12px;font-size:13px;margin-top:14px}
.warn b{color:#6b4e08}
.tip{position:fixed;pointer-events:none;background:#243447;color:#fff;padding:6px 10px;
  border-radius:6px;font-size:13px;opacity:0;transition:.1s;z-index:10;white-space:nowrap}
path{stroke:#ffffff;stroke-width:.4;cursor:default}
path:hover{stroke:#243447;stroke-width:1}
</style>
</head>
<body>
<div class="wrap">
<h1>Biblio-MapView</h1>
<div class="sub">Cole nome e valor, gere um mapa coroplético com escala contínua.</div>
<div class="tabs">
  <div class="tab on" id="tab-world" onclick="setMode('world')">Mundo</div>
  <div class="tab" id="tab-brasil" onclick="setMode('brasil')">Estados do Brasil</div>
</div>
<div class="grid">
  <div class="card">
    <label id="talbl" for="ta">Dados (nome [tab, vírgula ou ;] valor)</label>
    <textarea id="ta"></textarea>
    <div class="hint" id="hint"></div>
    <div class="controls">
      <div class="ctrl"><label>Cor baixa</label><input type="color" id="c1" value="#e8f0f5"></div>
      <div class="ctrl"><label>Cor alta</label><input type="color" id="c2" value="#1f5f8b"></div>
      <div class="ctrl"><label>Sem dado</label><input type="color" id="c0" value="#e9edf1"></div>
    </div>
    <div class="row">
      <button class="pri" onclick="render()">Gerar mapa</button>
      <button class="sec" onclick="dl('svg')">Baixar SVG</button>
      <button class="sec" onclick="dl('png')">Baixar PNG</button>
    </div>
    <div id="warn"></div>
  </div>
  <div class="card mapcard">
    <div id="mapbox"></div>
    <div class="legend">
      <span class="legval" id="lmin">0</span>
      <div class="legbar" id="legbar"></div>
      <span class="legval" id="lmax">0</span>
    </div>
    <div class="credit">Feito por ERNANDES SOBREIRA — UNEMAT/CELBE/LIPAN-LEFA — para fins educacionais</div>
  </div>
</div>
</div>
<div class="tip" id="tip"></div>

const DICT_EST={"acre":"Acre","ac":"Acre","alagoas":"Alagoas","al":"Alagoas","amazonas":"Amazonas","am":"Amazonas","amapa":"Amapá","ap":"Amapá","bahia":"Bahia","ba":"Bahia","ceara":"Ceará","ce":"Ceará","espirito santo":"Espírito Santo","es":"Espírito Santo","goias":"Goiás","go":"Goiás","maranhao":"Maranhão","ma":"Maranhão","minas gerais":"Minas Gerais","mg":"Minas Gerais","mato grosso do sul":"Mato Grosso do Sul","ms":"Mato Grosso do Sul","mato grosso":"Mato Grosso","mt":"Mato Grosso","para":"Pará","pa":"Pará","paraiba":"Paraíba","pb":"Paraíba","pernambuco":"Pernambuco","pe":"Pernambuco","piaui":"Piauí","pi":"Piauí","parana":"Paraná","pr":"Paraná","rio de janeiro":"Rio de Janeiro","rj":"Rio de Janeiro","rio grande do norte":"Rio Grande do Norte","rn":"Rio Grande do Norte","rondonia":"Rondônia","ro":"Rondônia","roraima":"Roraima","rr":"Roraima","rio grande do sul":"Rio Grande do Sul","rs":"Rio Grande do Sul","santa catarina":"Santa Catarina","sc":"Santa Catarina","sergipe":"Sergipe","se":"Sergipe","sao paulo":"São Paulo","sp":"São Paulo","tocantins":"Tocantins","to":"Tocantins","distrito federal":"Distrito Federal","df":"Distrito Federal"};
const tip=document.getElementById('tip');
let mode='world';

const SAMPLE={
  world:"Brasil 100\nBolívia 45\nArgentina 60\nEstados Unidos 90\nPeru 30\nParaguai 20",
  brasil:"Mato Grosso 100\nMato Grosso do Sul 70\nSão Paulo 90\nAmazonas 55\nBahia 40\nPará 65"
};

function norm(s){return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[.]/g,'').replace(/'/g,'').replace(/\s+/g,' ');}

function activeGeo(){return mode==='world'?WORLD:BRASIL;}
const GEOIDX={world:{},brasil:{}};
WORLD.features.forEach(f=>GEOIDX.world[norm(f.properties.name)]=f.properties.name);
BRASIL.features.forEach(f=>GEOIDX.brasil[norm(f.properties.name)]=f.properties.name);

function resolve(raw){
  const n=norm(raw);
  if(mode==='world'){ if(DICT_PT[n])return DICT_PT[n]; if(GEOIDX.world[n])return GEOIDX.world[n]; }
  else { if(DICT_EST[n])return DICT_EST[n]; if(GEOIDX.brasil[n])return GEOIDX.brasil[n]; }
  return null;
}

function parse(){
  const lines=document.getElementById('ta').value.split('\n');
  const data={},bad=[];
  for(let ln of lines){
    if(!ln.trim())continue;
    let parts=ln.split(/[\t;,]/);
    if(parts.length<2){parts=ln.trim().split(/\s+(?=[-\d.]+$)/);}
    if(parts.length<2){bad.push(ln.trim()+' (sem valor)');continue;}
    const val=parseFloat(parts[parts.length-1].replace(',','.'));
    const name=parts.slice(0,parts.length-1).join(' ').trim();
    if(isNaN(val)){bad.push(name+' (valor inválido)');continue;}
    const key=resolve(name);
    if(!key){bad.push(name+' (não reconhecido)');continue;}
    data[key]=(data[key]||0)+val;
  }
  return {data,bad};
}

// bounding box dinamico para o modo Brasil
function bbox(geo){
  let minx=180,miny=90,maxx=-180,maxy=-90;
  function walk(c){ if(typeof c[0]==='number'){minx=Math.min(minx,c[0]);maxx=Math.max(maxx,c[0]);miny=Math.min(miny,c[1]);maxy=Math.max(maxy,c[1]);} else c.forEach(walk); }
  geo.features.forEach(f=>walk(f.geometry.coordinates));
  return {minx,miny,maxx,maxy};
}

function makeProjector(geo,W,H){
  if(mode==='world'){
    return (lon,lat)=>[(lon+180)/360*W,(90-lat)/180*H];
  }
  const b=bbox(geo), pad=10;
  const sx=(W-2*pad)/(b.maxx-b.minx), sy=(H-2*pad)/(b.maxy-b.miny);
  const s=Math.min(sx,sy);
  const ox=pad+((W-2*pad)-s*(b.maxx-b.minx))/2;
  const oy=pad+((H-2*pad)-s*(b.maxy-b.miny))/2;
  return (lon,lat)=>[ox+(lon-b.minx)*s,oy+(b.maxy-lat)*s];
}

function ring2path(ring,proj){return ring.map((c,i)=>{const[x,y]=proj(c[0],c[1]);return(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);}).join('')+'Z';}
function geo2path(g,proj){
  if(g.type==='Polygon')return g.coordinates.map(r=>ring2path(r,proj)).join('');
  if(g.type==='MultiPolygon')return g.coordinates.map(p=>p.map(r=>ring2path(r,proj)).join('')).join('');
  return '';
}
function hex2rgb(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgb2hex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function lerp(a,b,t){return Math.round(a+(b-a)*t);}
function color(t,c1,c2){const a=hex2rgb(c1),b=hex2rgb(c2);return rgb2hex(lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t));}

function render(){
  const geo=activeGeo();
  const {data,bad}=parse();
  const vals=Object.values(data);
  const min=vals.length?Math.min(...vals):0;
  const max=vals.length?Math.max(...vals):1;
  const c1=document.getElementById('c1').value;
  const c2=document.getElementById('c2').value;
  const c0=document.getElementById('c0').value;
  const W=1000,H=mode==='world'?500:560;
  const proj=makeProjector(geo,W,H-28);
  let paths='';
  geo.features.forEach(f=>{
    if(f.properties.name==='Antarctica')return;
    const v=data[f.properties.name];
    let fill=c0;
    if(v!==undefined){const t=max>min?(v-min)/(max-min):0.5;fill=color(t,c1,c2);}
    const d=geo2path(f.geometry,proj);
    paths+=`<path d="${d}" fill="${fill}" data-n="${f.properties.name}" data-v="${v!==undefined?v:''}"/>`;
  });
  const svg=`<svg id="map" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><rect width="${W}" height="${H}" fill="#ffffff"/>${paths}</svg>`;
  document.getElementById('mapbox').innerHTML=svg;
  document.getElementById('lmin').textContent=min;
  document.getElementById('lmax').textContent=max;
  document.getElementById('legbar').style.background=`linear-gradient(90deg,${c1},${c2})`;
  document.querySelectorAll('#map path').forEach(p=>{
    p.addEventListener('mousemove',e=>{
      const v=p.getAttribute('data-v');
      tip.textContent=p.getAttribute('data-n')+(v?': '+v:' (sem dado)');
      tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';tip.style.opacity=1;
    });
    p.addEventListener('mouseleave',()=>tip.style.opacity=0);
  });
  document.getElementById('warn').innerHTML=bad.length?'<div class="warn"><b>Não plotados:</b> '+bad.join(' | ')+'</div>':'';
}

function setMode(m){
  mode=m;
  document.getElementById('tab-world').classList.toggle('on',m==='world');
  document.getElementById('tab-brasil').classList.toggle('on',m==='brasil');
  document.getElementById('ta').value=SAMPLE[m];
  document.getElementById('talbl').textContent=m==='world'?'Dados (país [tab, vírgula ou ;] valor)':'Dados (estado ou sigla [tab, vírgula ou ;] valor)';
  document.getElementById('hint').textContent=m==='world'?'Um país por linha. Português, inglês ou sigla (EUA/USA).':'Um estado por linha. Nome completo ou sigla (MT, SP, RJ...).';
  render();
}

function dl(fmt){
  const svgEl=document.getElementById('map');
  if(!svgEl){alert('Gere o mapa primeiro.');return;}
  const vb=svgEl.viewBox.baseVal;
  const cred=`<text x="${vb.width/2}" y="${vb.height-8}" text-anchor="middle" font-family="Arial" font-size="13" fill="#6b7c8f">${CRED}</text>`;
  const src=new XMLSerializer().serializeToString(svgEl).replace('</svg>',cred+'</svg>');
  const base=mode==='world'?'biblio-mapview-mundo':'biblio-mapview-brasil';
  if(fmt==='svg'){
    const b=new Blob([src],{type:'image/svg+xml'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=base+'.svg';a.click();return;
  }
  const img=new Image();
  const svg64=btoa(unescape(encodeURIComponent(src)));
  img.onload=()=>{
    const cv=document.createElement('canvas');const vb=svgEl.viewBox.baseVal;
    cv.width=2000;cv.height=Math.round(2000*vb.height/vb.width);
    const cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,cv.width,cv.height);
    cx.drawImage(img,0,0,cv.width,cv.height);
    const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=base+'.png';a.click();
  };
  img.src='data:image/svg+xml;base64,'+svg64;
}
setMode('world');
</script>
